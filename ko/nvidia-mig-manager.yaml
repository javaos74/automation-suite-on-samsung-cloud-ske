apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-mig-manager
  namespace: kube-system
  labels:
    app: nvidia-mig-manager
spec:
  selector:
    matchLabels:
      app: nvidia-mig-manager
  template:
    metadata:
      labels:
        app: nvidia-mig-manager
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      hostPID: true
      containers:
      - name: nvidia-mig-manager
        image: nvcr.io/nvidia/cloud-native/k8s-mig-manager:v0.9.0
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        # Set the desired MIG config profile name from gpu-mig-configmap.yaml
        - name: MIG_CONFIG
          value: "all-2g.20gb"
        - name: CONFIG_FILE
          value: "/etc/nvidia-mig-manager/config.yaml"
        volumeMounts:
        - name: mig-config
          mountPath: /etc/nvidia-mig-manager
          readOnly: true
        - name: host-root
          mountPath: /host
          readOnly: true
        - name: host-nvidia
          mountPath: /host/nvidia
      volumes:
      - name: mig-config
        configMap:
          name: nvidia-mig-config
      - name: host-root
        hostPath:
          path: /
          type: Directory
      - name: host-nvidia
        hostPath:
          path: /run/nvidia
          type: DirectoryOrCreate
  updateStrategy:
    type: RollingUpdate
