apiVersion: v1
kind: Service
metadata:
  name: istio-ingressgateway
  namespace: istio-system
  labels:
    app: istio-ingressgateway
    istio: ingressgateway
  annotations:
    # Samsung Cloud NLB Annotations
    # Reference: https://docs.e.samsungsdscloud.com/userguide/container/k8s_engine/usage_guide/k8s_typelb_use/
    #
    # Enable Public IP NAT on the NLB
    service.beta.kubernetes.io/scp-load-balancer-public-ip-enabled: "true"
    # UUID of the pre-allocated Public IP (from Samsung Cloud Console)
    service.beta.kubernetes.io/scp-load-balancer-public-ip-id: "<public-ip-id>"
    # Enable source range firewall rules
    service.beta.kubernetes.io/scp-load-balancer-source-ranges-firewall-rules: "true"
    # Load balancing method: ROUND_ROBIN | LEAST_CONNECTION | IP_HASH
    # service.beta.kubernetes.io/scp-load-balancer-lb-method: "ROUND_ROBIN"
    # Health check configuration
    # service.beta.kubernetes.io/scp-load-balancer-health-check-enabled: "true"
    # service.beta.kubernetes.io/scp-load-balancer-health-check-interval: "10"
    # service.beta.kubernetes.io/scp-load-balancer-health-check-timeout: "5"
    # service.beta.kubernetes.io/scp-load-balancer-health-check-count: "3"
spec:
  type: LoadBalancer
  loadBalancerIP: "<public-ip>"
  selector:
    app: istio-ingressgateway
    istio: ingressgateway
  ports:
  - name: status-port
    port: 15021
    protocol: TCP
    targetPort: 15021
  - name: http2
    port: 80
    protocol: TCP
    targetPort: 80
  - name: https
    port: 443
    protocol: TCP
    targetPort: 443
